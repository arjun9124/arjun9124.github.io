{{ $src := .Get "src" }}
{{ $alt := .Get "alt" | default "" }}
{{ $width := .Get "width" | default "500" }}

{{ with resources.Get $src }}
  {{ $dithered := .Fit (printf "%sx" $width) | images.Dither }}
  <img src="{{ $dithered.RelPermalink }}" alt="{{ $alt }}" width="{{ $width }}">
{{ else }}
  <p>Image not found: {{ $src }}</p>
{{ end }}
