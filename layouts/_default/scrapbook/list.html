{{ define "main" }}
  {{ .Content }}

  {{ range .Pages.GroupByDate "Jan 2006" }}
    <section class="month-group">
      <h3>{{ .Key }}</h3>

      <div class="month-row">
        {{ range .Pages }}
          {{ $page := . }}

          <article class="folder-block">
            <h4>{{ $page.Title }}</h4>

            <div class="photo-list">
              {{ range $page.Resources.ByType "image" }}
                {{ $img := .Fit "360x360" }}
                <a href="{{ $page.RelPermalink }}">
                  <img src="{{ $img.RelPermalink }}" alt="{{ $page.Title }}" height="240">
                </a>
              {{ end }}
            </div>
          </article>
        {{ end }}
      </div>
    </section>
  {{ end }}
{{ end }}
