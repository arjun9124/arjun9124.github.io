<style>
  :root {
  --width: 960px;
  --font-main: "IBM Plex Mono", monospace;
  --font-secondary: "IBM Plex Sans", sans-serif;
  --font-scale: 0.95em;
  --main-font-wt: 600;
}

:root,
[data-selected-theme="Dark"] {
   --background-color: #0c0c0c;
  --text-color: #eaeaea;
  --blockquote-color: #646464;
  --link-color: #4990fc;
  --visited-color: #94befc;
  --highlight-color: #042659;
  --heading-color: #eaeaea;
  --yellow: #ffff00;
  --theme-image-filter: grayscale(1) brightness(0.7) contrast(0.75);
}

[data-selected-theme="Bleach"] {
  --background-color: #bcbcbc;
  --text-color: #212121;
  --blockquote-color: #686868;
  --link-color: #0066ff;
  --visited-color: #004dc1;
  --highlight-color: #ffff00;
  --heading-color: #212121;
  --yellow: fuchsia;
  --theme-image-filter: sepia(0.5) hue-rotate(300deg) saturate(0.7) brightness(0.9);
}

[data-selected-theme="Puke"] {
  --background-color: #081820;
  --text-color: #e0f8d0;
  --blockquote-color: #88c070;
  --link-color: #88c070;
  --visited-color: #346856;
  --highlight-color: darkseagreen;
  --heading-color: #e0f8d0;
  --yellow: #88c070;
  --theme-image-filter: sepia(0.5) hue-rotate(40deg) saturate(0.7) brightness(0.9);
}

[data-selected-theme="CMYK"] {
  --background-color: #000;
  --text-color: #fff;
  --blockquote-color: #ffff00;
  --link-color: #00ffff;
  --visited-color: #ffff00;
  --highlight-color: #ff00ff;
  --heading-color: #ff00ff;
  --yellow: #ffff00;
}

/* BASE */
html,
body {
  margin: 0;
  min-height: 100%;
}

body {
  display: flex;
  flex-direction: column;
  min-height: 90vh;
  max-width: var(--width);
  margin: auto;
  padding: 20px;
  background: var(--background-color);
  color: var(--text-color);
  font-family: var(--font-secondary);
  font-size: var(--font-scale);
  line-height: 1.5;
  text-align: left;
  word-wrap: break-word;
  overflow-wrap: break-word;
}

main {
  flex: 1;
  line-height: 1.6;
}

main ul li {
  list-style-type: none;
}

[lang="hi"] {
  font-family: "IBM Plex Sans Devanagari", sans-serif;
}

/* HEADER */
.site-header {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: stretch;
  gap: 0.9rem 1.5rem;
  margin: 1rem 0 2rem;
}

.header-left {
  display: flex;
  align-items: flex-end;
  gap: 0.75rem;
  min-width: 0;
}

#profile-image {
  width: 3em;
  height: 3em;
  object-fit: cover;
  border: 1px solid var(--blockquote-color);
  flex: 0 0 auto;
}

.site-title {
  position: relative;
  top: 2px;
  color: var(--heading-color);
  font-family: var(--font-main);
  font-size: clamp(1.35rem, 3vw, 1.8rem);
  font-weight: 600;
  line-height: 1;
  text-decoration: none;
  white-space: nowrap;
}

.site-title:hover {
  background: transparent;
  color: var(--yellow);
}

/* RIGHT COLUMN */
.site-nav-wrap {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-self: stretch;
}

/* NAV */
.site-nav {
  font-size: 0.9em;
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  gap: 0.55rem;
  flex-wrap: wrap;
}

.site-nav a {
  letter-spacing: 0.01em;
  padding: 0.05rem 0.2rem;
  line-height: 1.25;
  text-decoration: none;
  white-space: nowrap;
}

.site-nav a:hover,
.site-nav a.active {
  background: var(--yellow);
  color: var(--background-color);
}

/* THEME */
.theme-switcher {
  display: flex;
  align-items: center;
  margin-left: 0.6rem;
  gap: 0.2rem;
}

@media (max-width: 700px) {
  .site-header {
    align-items: flex-start;
  }

  .site-nav-wrap {
    width: 100%;
  }

  .site-nav {
    justify-content: flex-start;
  }

  .site-title {
    white-space: normal;
  }
}
/* THEME BUTTONS */
.theme-switcher {
  display: flex;
  align-items: center;
  gap: 0.25rem;
  margin-left: 0.35rem;
}

button[data-theme],
.theme-switcher button {
  width: 1.55rem;
  height: 1.4rem;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  border: 1px solid var(--blockquote-color);
  background: transparent;
  color: var(--text-color);
  font-family: var(--font-main);
  font-size: 0.75rem;
  line-height: 1;
  cursor: pointer;
}

button[data-theme]:hover,
button[data-theme][aria-pressed="true"] {
  background: var(--yellow);
  color: var(--background-color);
  border-color: var(--yellow);
}

/* LAYOUT */
.layout-shell {
  display: flex;
  align-items: flex-start;
  gap: 4rem;
}

.layout-main {
  flex: 1 1 auto;
  min-width: 0;
}

.layout-sidebar {
  flex: 0 0 280px;
  width: 280px;
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
  min-width: 0;
  margin-top: 0.35rem;
}

.layout-sidebar > * {
  width: 100%;
  max-width: 100%;
  min-width: 0;
  box-sizing: border-box;
}

.sidebar-wrap-group,
.sidebar-stack-group {
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
}

.sidebar-block {
  width: 100%;
  box-sizing: border-box;
}

.recent-image-block {
  line-height: 0;
}

.whats-going-on-block h2,
.van-block .misc-title {
  margin-top: 0;
  margin-bottom: 0.35rem;
}

.whats-going-on-block span {
  display: block;
  line-height: 1.45;
}

.whats-going-on-block span + span {
  margin-top: 0.35rem;
}

/*footer stuff*/
.site-footer {
  padding: 2rem 0 1rem;
  font-size: 0.9em;
}

.footer-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.footer-links {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
  align-items: center;
}

.footer-links a {
  white-space: nowrap;
}

.footer-links a:not(:last-child)::after {
  content: "/";
  margin-left: 0.35rem;
  color: var(--blockquote-color);
}

.footer-copyright {
  margin-left: auto;
  color: var(--blockquote-color);
  white-space: nowrap;
  text-align: right;
}

@media (max-width: 700px) {
  .footer-row {
    align-items: flex-start;
  }

  .footer-copyright {
    margin-left: 0;
    text-align: left;
  }
}

/*webrings*/
.webrings-title {
  color: var(--blockquote-color);
  margin-bottom: 0.35rem;
}

.webrings-links {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0.25rem 0.45rem;
  font-size: 0.8em;
  line-height: 1.4;
}

.webring {
  display: inline-flex;
  align-items: center;
  gap: 0.18rem;
  white-space: nowrap;
  font-weight: 400;
}

.webring:not(:last-child)::after {
  content: "/";
  margin-left: 0.45rem;
  color: var(--blockquote-color);
}

.webring a {
  color: var(--link-color);
  font-weight: 400;
  text-decoration: none;
  white-space: nowrap;
}

.webring a:hover {
  background: var(--yellow);
  color: var(--background-color);
}
/* TYPOGRAPHY */
h1,
h2,
h3,
h4,
h5,
h6 {
  font-family: var(--font-main);
  color: var(--heading-color);
  margin-bottom: 0.5em;
  font-weight: var(--main-font-wt);
}

h1::before,
h2::before,
h3::before,
h4::before,
h5::before,
h6::before {
  content: "# ";
  font-weight: var(--main-font-wt);
}

h1.site-title::before {
  content: "";
}

h2 {
  font-size: 1.35em;
}

h2.recent {
  padding-top: 1em;
  margin-top: 0;
  margin-bottom: 0;
}

h2.misc {
  margin-top: 0;
  padding-top: 0;
  margin-bottom: 0;
}

small.grey {
  color: grey;
}

.smallquote {
  font-size: 0.9em;
}

blockquote {
  border-left: 1px solid #999;
  color: var(--blockquote-color);
  padding-left: 15px;
  font-style: italic;
}

a {
  color: var(--link-color);
  cursor: pointer;
  text-decoration: none;
}

a:hover {
  background: var(--yellow);
  color: var(--background-color);
}

ul.blog-posts {
  list-style-type: none;
  padding: unset;
}

ul.blog-posts li {
  display: flex;
}

ul.blog-posts li span {
  flex: 0 0 130px;
}

ul.blog-posts li a:visited {
  color: var(--visited-color);
}

strong,
b {
  color: var(--heading-color);
}

time {
  font-family: monospace;
  font-style: normal;
  font-size: 15px;
}

/* MEDIA */
img {
  max-width: 90%;
}

img.theme-filtered {
  filter: var(--theme-image-filter);
  transition: filter 0.25s ease;
}

img.theme-filtered:hover {
  filter: none;
}

.inline {
  width: auto !important;
}

.thought img {
  max-height: 200px;
}

.thought {
  margin-left: 1em;
  padding-left: 1em;
  border-left: dashed 2px var(--blockquote-color);
}

/* MISC */
s {
  text-decoration: line-through solid red;
}

cul,
u {
  text-decoration: underline solid;
  text-decoration-color: var(--link-color);
}

code {
  font-family: monospace;
  padding: 2px;
  border-radius: 3px;
}

.highlight,
.code {
  border-radius: 3px;
  margin-block: 1em;
  overflow-x: auto;
}

table {
  width: 100%;
}

hr {
  border: 0;
  border-top: 1px dashed;
}

details > summary {
  font-weight: 700;
  line-height: 2em;
}

.chnglog p {
  line-height: 1.2em;
}

.post-updated {
  margin-left: 0.25rem;
  font-size: 0.6em;
  color: var(--yellow);
  text-transform: lowercase;
}

.post-signature {
  font-family: var(--font-main);
  font-size: 1em;
  font-weight: var(--main-font-wt);
}

.post-nav {
  display: flex;
  gap: 0.75rem;
  font-size: 0.8em;
  width: 100%;
}

.post-nav-cell {
  border: 1px dashed var(--blockquote-color);
  box-sizing: border-box;
  flex: 1;
  min-width: 0;
  padding: 0.5rem 0.65rem;
}

a.post-nav-cell:hover {
  background: inherit;
  border: 2px dashed var(--yellow);
  color: inherit;
}

.post-nav-prev {
  text-align: left;
}

.post-nav-tags {
  border: 0;
  text-align: center;
}

.post-nav-next {
  text-align: right;
}

.container,
.month-row,
.photo-list,
.menumisc {
  display: flex;
  flex-wrap: wrap;
}

.container {
  gap: 10px;
}

.column {
  flex: 1 1 80%;
}

.month-row {
  gap: 1.5rem;
  align-items: flex-start;
}

.photo-list {
  gap: 0.5rem;
}

.folder-block {
  display: flex;
  flex-direction: column;
}

a.misc {
  text-decoration: underline;
  text-decoration-thickness: 2px;
  text-underline-offset: 3px;
  text-decoration-color: var(--highlight-color);
}

.misc-block {
  margin-top: 0;
}

.misc-heading {
  margin-bottom: 0.45rem;
}

.misc-title {
  margin: 0;
}

.misc-links {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem 0.6rem;
  align-items: center;
}


.misc-link.active,
.misc-link:hover {
  background: var(--yellow);
  color: var(--background-color);
}

.misc-link-item:not(:last-child)::after {
  content: "/";
  margin-left: 0.35rem;
  color: var(--blockquote-color);
}

.misc-link.is-new::after {
  content: " new";
  color: var(--yellow);
  font-size: 0.75em;
}

.misc-link.is-updated::after {
  content: " updated";
  color: var(--yellow);
  font-size: 0.75em;
}

.misc-link.is-new,
.misc-link.is-updated {
  animation: blink-underline 1s steps(2, start) infinite;
}

.misc.is-new,
.misc.is-updated {
  animation: blink-underline 1s steps(2, start) infinite;
}


@keyframes blink-underline {
  0% { text-decoration-color: currentColor; }
  50% { text-decoration-color: transparent; }
  100% { text-decoration-color: var(--yellow); }
}

.title-cursor {
  display: inline-block;
  margin-left: -0.5em;
  animation: titleCursorBlink 1s steps(1, end) infinite;
}

.title-cursor::after {
  content: "_";
}

@keyframes titleCursorBlink {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0; }
}


/*recents*/
.section-block {
  margin-top: 1rem;
}

.section-heading {
  margin-bottom: 0.6rem;
}

.section-heading h2 {
  margin: 0;
}

.posts-list {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
}

.post {
  line-height: 1.45;
}

.post-title {
  font-weight: 500;
}

.post-desc::before {
  content: " - ";
  color: var(--blockquote-color);
}

.post-desc {
  color: var(--text-color);
}

@media (max-width: 700px) {
  .post-nav {
    flex-direction: column;
  }

  .post-nav-cell {
    text-align: left;
  }

  .post-desc {
    display: block;
  }

  .post-desc::before {
    content: "";
  }
}

/* MOBILE */
@media (max-width: 900px) {
  .layout-shell {
    flex-direction: column;
    gap: 2rem;
  }

  .layout-main,
  .layout-sidebar {
    width: 100%;
  }

  .layout-sidebar {
    flex: none;
    order: 2;
  }

  .sidebar-wrap-group {
    flex-direction: row;
    flex-wrap: wrap;
    align-items: flex-start;
  }

  .sidebar-wrap-group .sidebar-block {
    flex: 1 1 220px;
    min-width: 0;
  }
}
@media (max-width: 900px) {
  body {
    padding: 16px;
  }

  .site-header {
    display: grid;
    grid-template-columns: 56px 1fr;
    align-items: end;
    gap: 0.75rem;
  }

  .header-left {
    display: contents;
  }

  #profile-image {
    grid-column: 1;
  }

  .site-title {
    grid-column: 2;
    white-space: normal;
    font-size: clamp(1.45rem, 7vw, 1.9rem);
    line-height: 1;
    top: 0;
  }

  .site-nav-wrap {
    grid-column: 1 / -1;
    width: 100%;
  }

  .site-nav {
    width: 100%;
    justify-content: flex-start;
    gap: 0.45rem;
    margin-top: 0.35rem;
  }

  .theme-switcher {
    width: 100%;
    margin-left: 0;
    margin-top: 0.15rem;
    display: flex;
    gap: 0.35rem;
  }
}
</style>
