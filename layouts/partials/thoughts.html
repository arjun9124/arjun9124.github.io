<div class="thought">
{{ with .Site.GetPage "/microblog" }}
  {{ range first 1 (where .Pages ".Params.private" "!=" true).ByDate.Reverse }}
    <span>
      {{ if eq .Type "thought" }}
      {{ else if eq .Type "status" }}
      {{ end }}
      {{ .Summary | plainify }}
      <br>
      <small>
        ({{ .PublishDate.Format "Jan 2" }} ·
        <a href="{{ .Permalink }}">{{ .Title }}</a> ·
        <a href="/microblog">more</a>)
      </small>
    </span>
  {{ end }}
{{ end }}
</div>
