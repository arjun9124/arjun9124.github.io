<div class="thought">
<b>A recent thought...</b>
{{ with .Site.GetPage "/thoughts" }}
    {{ range first 1 (sort .Data.Pages "Date" "desc" (where .Pages ".Params.private" "!=" true))}}
  <blockquote class="smallquote">                          
{{ .Summary }}
</blockquote>
<small>- Arjun on {{ .PublishDate.Format "Jan. 2, 2006" }} | <a href="{{ .Permalink }}" title="{{ .Title }}">{{ .Title }}</a> | <a href="/thoughts">more thoughts</a>
</small>
    {{ end }}
{{ end }}
</div>
