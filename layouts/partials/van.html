<section class="misc-block">
  <header class="misc-heading">
    <h2 class="misc-title">Miscellaneous</h2>
    <small class="grey">Too cool to be categorized.</small>
  </header>

  <nav class="misc-links" aria-label="Miscellaneous links">
    {{ range sort .Site.Menus.misc "Page.Lastmod" "desc" }}
      {{ $active := or ($.IsMenuCurrent "misc" .) ($.HasMenuCurrent "misc" .) }}
      <a
        href="{{ .URL | relURL }}"
        class="misc-link {{ if $active }}active{{ end }}{{ with .Page }}{{ if .Params.newpage }} is-new{{ else if .Params.updated }} is-updated{{ end }}{{ end }}"
      >
        {{ .Name }}
      </a>
    {{ end }}
  </nav>
</section>
