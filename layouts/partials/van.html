<div>
  <div>
    <h2 class="misc">Miscllaneous</h2>
    <small class="grey">Too cool to be categorized.</small>
  </div>

      {{ range .Site.Menus.misc }}
        {{ $active := or ($.IsMenuCurrent "misc" .) ($.HasMenuCurrent "misc" .) }}
        <a href="{{ .URL | relURL }}" 
   class="misc
   {{ with .Page }}
     {{ if .Params.newpage }} is-new

     {{ end }}
   {{ end }}">
  {{ .Name }}
</a><br>
      {{ end }}
</div>
