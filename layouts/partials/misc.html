<section class="misc-block">
  <header class="misc-heading">
    <small class="misc-title">More Miscellaneous Pages</small>
  </header>

  <nav class="misc-links" aria-label="More miscellaneous pages">
    {{ range $item := sort .Site.Menus.misc "Page.Lastmod" "desc" }}
      {{ $active := or ($.IsMenuCurrent "misc" $item) ($.HasMenuCurrent "misc" $item) }}
      <span class="misc-link-item">
      <a
        href="{{ $item.URL | relURL }}"
        class="misc-link{{ if $active }} active{{ end }}{{ with $item.Page }}{{ if .Params.newpage }} is-new{{ else if .Params.updated }} is-updated{{ end }}{{ end }}"
      >
        {{ $item.Name }}
      </a>
      </span>
    {{ end }}
  </nav>
</section>
