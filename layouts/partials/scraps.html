<div class="image-grid" style="padding-left: 10px; padding-top: 10px;">
  {{ $pages := slice }}

  {{ with .Site.GetPage "/scrapbook" }}
    {{ $pages = $pages | append .RegularPages }}
  {{ end }}


  {{ range first 1 (sort $pages "Date" "desc") }}
    {{ $page := . }}

    <!--<h4>{{ $page.Title }}</h4>-->

    <a href="{{ $page.RelPermalink }}" title="{{ $page.Title }}">
      {{ with $page.Resources.GetMatch $page.Params.image }}
        {{ $thumb := .Resize "400x" }}
        <img src="{{ $thumb.RelPermalink }}" alt="{{ $page.Title }}" class="img-responsive" style="max-width:20%px; ">
      {{ end }}
    </a>

    <!--  <p>{{ $page.Plain | truncate 160 }}</p> */-->
  {{ end }}
</div>
